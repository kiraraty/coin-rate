name: Funding Snapshot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger snapshot API
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/funding-snapshot"
